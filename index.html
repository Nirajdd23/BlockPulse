<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArcSave</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 28px;
}

button {
  background: #00e676;
  border: none;
  padding: 10px 20px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.8;
}

.card {
  background: #0f172a;
  padding: 20px;
  margin: 15px auto;
  width: 80%;
  border-radius: 10px;
}

input {
  padding: 10px;
  width: 60%;
  margin-bottom: 10px;
}
</style>

</head>
<body>

<h1>🚀 Earn Passive Yield with ArcSave</h1>
<p>Secure. Simple. High Returns.</p>

<button onclick="connectWallet()">Connect Wallet</button>

<h2>Dashboard</h2>

<div class="card">
  <p>Your Wallet:</p>
  <h3 id="wallet">Not Connected</h3>
</div>

<div class="card">
  <input id="amount" placeholder="Enter amount" />
  <br>
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<script>
// Wallet Connect
async function connectWallet() {
  if (typeof window.ethereum !== 'undefined') {
    try {
      const accounts = await ethereum.request({
        method: 'eth_requestAccounts'
      });
      document.getElementById("wallet").innerText = accounts[0];
    } catch (error) {
      console.log(error);
    }
  } else {
    alert("Install MetaMask!");
  }
}

// Deposit
function deposit() {
  let amt = document.getElementById("amount").value;

  if (!amt) {
    alert("Enter amount");
    return;
  }

  alert("Deposited: " + amt);
}

// Withdraw
function withdraw() {
  let amt = document.getElementById("amount").value;

  if (!amt) {
    alert("Enter amount");
    return;
  }

  alert("Withdrawn: " + amt);
}
</script>

</body>
</html>
